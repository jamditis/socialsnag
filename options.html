<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialSnag settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            width: 500px;
            background: #050a18;
            color: #e5e7eb;
            min-height: 100vh;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            color: #ffffff;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 16px;
            color: #ffffff;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
            color: #d1d5db;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
        }
        .option-group {
            margin-bottom: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
        }
        .option-group:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .option-group input[type="checkbox"] {
            margin-right: 10px;
            accent-color: #3b82f6;
        }
        .option-group label {
            display: inline-block;
            cursor: pointer;
            color: #f9fafb;
            font-weight: 500;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        #status {
            margin-top: 16px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #status.success { color: #22c55e; }
        #status.error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SocialSnag settings</h1>
        <p>Configure which platforms are enabled and how downloads behave.</p>

        <h2>Enabled platforms</h2>

        <div class="option-group">
            <input type="checkbox" id="platform-instagram" checked>
            <label for="platform-instagram">Instagram</label>
        </div>
        <div class="option-group">
            <input type="checkbox" id="platform-twitter" checked>
            <label for="platform-twitter">Twitter / X</label>
        </div>
        <div class="option-group">
            <input type="checkbox" id="platform-facebook" checked>
            <label for="platform-facebook">Facebook</label>
        </div>
        <div class="option-group">
            <input type="checkbox" id="platform-youtube" checked>
            <label for="platform-youtube">YouTube (thumbnails)</label>
        </div>
        <div class="option-group">
            <input type="checkbox" id="platform-linkedin" checked>
            <label for="platform-linkedin">LinkedIn</label>
        </div>
        <div class="option-group">
            <input type="checkbox" id="platform-tiktok" checked>
            <label for="platform-tiktok">TikTok</label>
        </div>

        <h2>Notifications</h2>
        <div class="option-group">
            <input type="checkbox" id="showNotifications" checked>
            <label for="showNotifications">Show download notifications</label>
        </div>

        <button id="save">Save settings</button>
        <div id="status"></div>
    </div>
    <script src="options.js"></script>
</body>
</html>
