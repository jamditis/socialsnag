<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>Screenshot wrapper tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  .store-screenshot-frame {
    width: 1280px;
    height: 800px;
    background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
    position: relative;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .mesh {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .caption {
    position: absolute;
    top: 60px;
    left: 80px;
    z-index: 2;
  }

  .caption-title {
    color: #f8fafc;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .caption-subtitle {
    color: #38bdf8;
    font-size: 24px;
    margin-top: 8px;
  }

  .browser-mockup {
    position: absolute;
    top: 200px;
    width: 1120px;
    height: 700px;
    background: #ffffff;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .browser-header {
    height: 48px;
    background: #f1f5f9;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }

  .traffic-light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .close { background: #ff5f56; }
  .minimize { background: #ffbd2e; }
  .maximize { background: #27c93f; }

  .browser-content {
    flex: 1;
    background-color: #f8fafc;
    background-size: cover;
    background-position: top center;
    background-image: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
  }
</style>
</head>
<body>

  <div class="store-screenshot-frame">
    <div class="mesh"></div>

    <div class="caption">
      <div class="caption-title">Right-click to download</div>
      <div class="caption-subtitle">Extracts the original, uncompressed media file.</div>
    </div>

    <div class="browser-mockup">
      <div class="browser-header">
        <div class="traffic-light close"></div>
        <div class="traffic-light minimize"></div>
        <div class="traffic-light maximize"></div>
      </div>
      <div class="browser-content"></div>
    </div>
  </div>

</body>
</html>
