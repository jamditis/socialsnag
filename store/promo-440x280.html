<style>
  :root {
    --surface-dark: #020617;
    --surface-light: #0f172a;
    --accent-blue: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.15);
    --text-primary: #f8fafc;
    --text-muted: #94a3b8;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    background-color: var(--surface-dark);
    font-family: 'Space Grotesk', sans-serif;
  }

  .canvas {
    position: relative;
    width: 440px;
    height: 280px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 0%, var(--surface-light) 0%, transparent 70%),
      radial-gradient(var(--surface-light) 1px, transparent 1px);
    background-size: 100% 100%, 20px 20px;
    background-position: 0 0, center center;
  }

  .ambient-glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: var(--accent-glow);
    border-radius: 50%;
    filter: blur(40px);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
  }

  .content-wrapper {
    position: absolute;
    z-index: 1;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .icon-container {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    background: var(--surface-light);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.05) inset,
      0 20px 40px -10px rgba(0, 0, 0, 0.8),
      0 0 30px -5px var(--accent-glow);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .icon-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .typography {
    text-align: center;
  }

  .title {
    color: var(--text-primary);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--accent-blue);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    white-space: nowrap;
  }

  @keyframes slideUpFade {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="ambient-glow"></div>
    <div class="content-wrapper">
      <div class="icon-container">
        <img src="../icons/icon.svg" alt="SocialSnag Icon">
      </div>
      <div class="typography">
        <div class="title">SocialSnag</div>
        <div class="subtitle">High-def media downloads</div>
      </div>
    </div>
  </div>
</body>
</html>
