<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, initial-scale=1.0">
<title>SocialSnag promo tile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 440px;
    height: 280px;
    overflow: hidden;
    background: #0f172a;
  }
  body {
    width: 440px;
    height: 280px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -16px;
  }
  .icon {
    width: 80px;
    height: 80px;
    margin-bottom: 12px;
  }
  .title {
    color: #ffffff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <rect x="16" y="16" width="96" height="96" rx="18" fill="#3b82f6"/>
      <rect x="57" y="34" width="14" height="30" rx="2" fill="#fff"/>
      <polygon points="64,82 42,58 86,58" fill="#fff"/>
      <rect x="36" y="90" width="56" height="6" rx="3" fill="#fff"/>
    </svg>
    <div class="title">SocialSnag</div>
  </div>
</body>
</html>
