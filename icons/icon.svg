<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" />

  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="32" x2="128" y2="32" />
    <line x1="0" y1="64" x2="128" y2="64" />
    <line x1="0" y1="96" x2="128" y2="96" />
    <line x1="32" y1="0" x2="32" y2="128" />
    <line x1="64" y1="0" x2="64" y2="128" />
    <line x1="96" y1="0" x2="96" y2="128" />
  </g>

  <rect x="24" y="24" width="72" height="72" rx="12" fill="none" stroke="#334155" stroke-width="4" transform="rotate(-8 64 64)" />
  <rect x="28" y="28" width="72" height="72" rx="12" fill="#0f172a" stroke="#475569" stroke-width="4" filter="url(#dropShadow)" />

  <path d="M64 36 L64 76" fill="none" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" filter="url(#dropShadow)" />
  <path d="M42 58 L64 82 L86 58" fill="none" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)" />

  <circle cx="64" cy="98" r="5" fill="#38bdf8" filter="url(#neonGlow)" />
</svg>
